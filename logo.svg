<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0066;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="doorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#techGradient)" opacity="0.1"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#techGradient)" stroke-width="3" stroke-dasharray="8 8"/>
  
  <!-- Central Door Icon -->
  <rect x="140" y="140" width="120" height="140" rx="12" fill="url(#doorGradient)" filter="url(#glow)"/>
  <rect x="180" y="210" width="40" height="70" fill="#2d2d35" rx="8"/>
  <circle cx="195" cy="245" r="5" fill="#ffd966"/>
  <path d="M 210 245 L 230 245 L 225 240 L 230 245 L 225 250 Z" fill="#ffd966"/>
  
  <!-- World/Globe Element -->
  <circle cx="260" cy="160" r="28" fill="none" stroke="#00d4ff" stroke-width="3"/>
  <circle cx="260" cy="160" r="22" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M 260 132 L 260 188 M 246 160 L 274 160" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="260" cy="160" r="5" fill="#00d4ff"/>
  
  <!-- Tech/Medical Cross -->
  <g transform="translate(140, 100)">
    <rect x="15" y="0" width="10" height="40" fill="#ff0066"/>
    <rect x="0" y="15" width="40" height="10" fill="#ff0066"/>
  </g>
  
  <!-- Circuit Lines -->
  <path d="M 340 120 L 380 120 L 380 80 L 420 80" stroke="url(#techGradient)" stroke-width="2" fill="none" stroke-dasharray="5 3"/>
  <path d="M 340 280 L 380 280 L 380 320 L 420 320" stroke="url(#techGradient)" stroke-width="2" fill="none" stroke-dasharray="5 3"/>
  <circle cx="420" cy="80" r="4" fill="#00d4ff"/>
  <circle cx="420" cy="320" r="4" fill="#ff0066"/>
  
  <!-- Text -->
  <text x="200" y="330" text-anchor="middle" font-family="Poppins, 'Segoe UI', Arial" font-weight="800" font-size="32" fill="url(#techGradient)">
    TECHMEDIXLINC
  </text>
  <text x="200" y="370" text-anchor="middle" font-family="Poppins, 'Segoe UI', Arial" font-weight="500" font-size="20" fill="#888" letter-spacing="2">
    WORLD DOOR
  </text>
  
  <!-- Tagline -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">
    ENTER THE FUTURE OF HEALTH TECH
  </text>
</svg>
